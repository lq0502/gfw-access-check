<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中国国内アクセス確認</title>
<style>
  :root{
    --paper:#F5F6F8; --surface:#FFFFFF; --ink:#14181F; --muted:#5B6472;
    --line:#E4E7EC; --accent:#2749C9; --accent-soft:#EAEEFB;
    --ok:#1F9254; --block:#C8321F; --warn:#B26A00; --warn-soft:#FBF1E1;
    --font-sans:system-ui,-apple-system,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
    --font-mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--font-sans); line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:900px; margin:0 auto; padding:48px 20px 80px}

  header.top{margin-bottom:28px}
  h1{font-size:28px; margin:0; letter-spacing:-.01em}

  .panel{background:var(--surface); border:1px solid var(--line);
    border-radius:14px; padding:22px}
  .querybar{display:flex; gap:10px; flex-wrap:wrap}
  .field{flex:1 1 260px; display:flex; align-items:center; gap:8px;
    border:1px solid var(--line); border-radius:10px; padding:0 14px;
    background:var(--paper)}
  .field:focus-within{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .field .glyph{color:var(--muted); font-size:14px; font-family:var(--font-mono)}
  input[type=text]{flex:1; border:0; background:transparent; padding:13px 0;
    font-size:15px; color:var(--ink); outline:none; font-family:var(--font-mono)}
  button.go{border:0; border-radius:10px; background:var(--accent); color:#fff;
    font-size:15px; font-weight:600; padding:0 22px; cursor:pointer;
    font-family:var(--font-sans)}
  button.go:hover{background:#1d3aa8}
  button.go:disabled{opacity:.55; cursor:default}

  /* 結果 */
  .results{margin-top:26px}
  .results[hidden]{display:none}
  .error{font-size:15px; font-weight:600; color:var(--warn); background:var(--warn-soft);
    border:1px solid #EFDBB4; border-radius:10px; padding:12px 14px; margin-bottom:16px}
  .error[hidden]{display:none}

  .meta{display:flex; gap:24px; flex-wrap:wrap; font-size:13px; color:var(--muted);
    margin:0 4px 16px; font-family:var(--font-mono)}
  .meta b{color:var(--ink); font-weight:600}

  .nodes{display:grid; grid-template-columns:repeat(5,1fr); gap:12px}
  @media(max-width:720px){.nodes{grid-template-columns:repeat(2,1fr)}}
  .node{border:1px solid var(--line); border-radius:12px; padding:14px;
    background:var(--surface); opacity:0; transform:translateY(6px);
    transition:opacity .28s ease, transform .28s ease;
    transition-delay:calc(var(--i)*70ms)}
  .node.in{opacity:1; transform:none}
  .node .loc{display:flex; align-items:center; gap:7px; font-weight:600; font-size:14px}
  .node .sd{width:9px; height:9px; border-radius:50%; flex:0 0 auto; background:var(--muted)}
  .node.ok .sd{background:var(--ok)}
  .node.block .sd{background:var(--block)}
  .node.warn .sd{background:var(--warn)}
  .node .ip{font-family:var(--font-mono); font-size:12.5px; color:var(--ink);
    margin-top:10px; word-break:break-all; min-height:18px}
  .node .tag{font-size:20px; margin-top:10px; font-weight:700; letter-spacing:.02em}
  .node.ok .tag{color:var(--ok)}
  .node.block .tag,.node.warn .tag{color:var(--block)}

  @media(prefers-reduced-motion:reduce){
    .node{transition:none; transition-delay:0ms!important; opacity:1; transform:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>中国国内アクセス確認</h1>
  </header>

  <div class="panel">
    <div class="querybar">
      <label class="field">
        <span class="glyph">https://</span>
        <input id="domain" type="text" placeholder="ドメインを入力（例：example.com）" autocomplete="off" spellcheck="false">
      </label>
      <button class="go" id="run">確認</button>
    </div>
  </div>

  <section class="results" id="results" hidden>
    <div class="error" id="error" hidden>確認できませんでした</div>
    <div class="meta" id="meta">
      <span>ドメイン <b id="mDomain"></b></span>
      <span>基準IP <b id="mExpected"></b></span>
    </div>
    <div class="nodes" id="nodes"></div>
  </section>
</div>

<script>
/* 設定 */
const CONFIG = {
  // Cloudflare Pages: '/proxy' / Vercel: '/api/proxy' / PHP: './proxy.php'
  endpoint: '/proxy',
};

const LOC_JA = {
  'Beijing':'北京',
  'Shenzhen':'深圳',
  'Inner Mongolia':'内モンゴル',
  'Heilongjiang Province':'黒竜江省',
  'Yunnan Province':'雲南省',
};

const $ = selector => document.querySelector(selector);
const input = $('#domain');
const runBtn = $('#run');

function cleanDomain(value){
  return (value || '')
    .trim()
    .replace(/^https?:\/\//i, '')
    .replace(/\/.*$/, '')
    .replace(/[^a-zA-Z0-9.\-]/g, '');
}

runBtn.onclick = runTest;
input.addEventListener('keydown', event => {
  if(event.key === 'Enter') runTest();
});

async function runTest(){
  const domain = cleanDomain(input.value);
  if(!domain){
    input.focus();
    return;
  }

  input.value = domain;
  runBtn.disabled = true;
  runBtn.textContent = '確認中…';
  $('#error').hidden = true;

  try{
    const response = await fetch(`${CONFIG.endpoint}?domain=${encodeURIComponent(domain)}`);
    if(!response.ok) throw new Error(`HTTP ${response.status}`);

    const data = await response.json();
    if(data.error) throw new Error(data.error);

    render(data);
  }catch(error){
    showError();
    console.error(error);
  }finally{
    runBtn.disabled = false;
    runBtn.textContent = '確認';
  }
}

function render(data){
  $('#mDomain').textContent = data.domain || '—';
  $('#mExpected').textContent = data.expected || '—';
  $('#meta').hidden = false;

  const box = $('#nodes');
  box.innerHTML = '';

  (data.nodes || []).forEach((node, index) => {
    const isNormal = node.status === 'ok' && node.match !== false;
    const className = isNormal ? 'ok' : (node.status === 'ok' ? 'warn' : 'block');
    const tag = isNormal ? '正常' : '異常';

    const element = document.createElement('div');
    element.className = `node ${className}`;
    element.style.setProperty('--i', index);
    element.innerHTML = `
      <div class="loc"><span class="sd"></span>${LOC_JA[node.location] || node.location}</div>
      <div class="ip">${node.ips || '—'}</div>
      <div class="tag">${tag}</div>`;

    box.appendChild(element);
    requestAnimationFrame(() => requestAnimationFrame(() => element.classList.add('in')));
  });

  $('#results').hidden = false;
  $('#results').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function showError(){
  $('#meta').hidden = true;
  $('#nodes').innerHTML = '';
  $('#error').hidden = false;
  $('#results').hidden = false;
  $('#results').scrollIntoView({behavior:'smooth', block:'nearest'});
}
</script>
</body>
</html>
