<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中国アクセスチェック</title>
<style>
  :root{
    --paper:#F5F6F8; --surface:#FFFFFF; --ink:#14181F; --muted:#5B6472;
    --line:#E4E7EC; --accent:#2749C9; --accent-soft:#EAEEFB;
    --ok:#1F9254; --ok-soft:#E7F3EC; --block:#C8321F; --block-soft:#FBEAE7;
    --warn:#B26A00; --warn-soft:#FBF1E1;
    --font-sans: system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",Meiryo,sans-serif;
    --font-mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--font-sans); line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:900px; margin:0 auto; padding:48px 20px 80px}

  header.top{margin-bottom:24px}
  h1{font-size:26px; margin:0; letter-spacing:-.01em}

  .panel{background:var(--surface); border:1px solid var(--line);
    border-radius:14px; padding:22px}
  .querybar{display:flex; gap:10px; flex-wrap:wrap}
  .field{flex:1 1 260px; display:flex; align-items:center; gap:8px;
    border:1px solid var(--line); border-radius:10px; padding:0 14px;
    background:var(--paper)}
  .field:focus-within{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .field .glyph{color:var(--muted); font-size:14px; font-family:var(--font-mono)}
  input[type=text]{flex:1; border:0; background:transparent; padding:13px 0;
    font-size:15px; color:var(--ink); outline:none; font-family:var(--font-mono)}
  button.go{border:0; border-radius:10px; background:var(--accent); color:#fff;
    font-size:15px; font-weight:600; padding:0 22px; cursor:pointer;
    font-family:var(--font-sans)}
  button.go:hover{background:#1d3aa8}
  button.go:disabled{opacity:.55; cursor:default}

  .results{margin-top:26px}
  .results[hidden]{display:none}

  .banner{font-size:13px; color:var(--block); background:var(--block-soft);
    border:1px solid #F0CDC7; border-radius:8px; padding:10px 12px; margin-bottom:16px}
  .banner[hidden]{display:none}

  .meta{display:flex; gap:24px; flex-wrap:wrap; font-size:13px; color:var(--muted);
    margin:0 4px 16px; font-family:var(--font-mono)}
  .meta b{color:var(--ink); font-weight:600}

  .nodes{display:grid; grid-template-columns:repeat(5,1fr); gap:12px}
  @media(max-width:720px){.nodes{grid-template-columns:repeat(2,1fr)}}
  .node{border:1px solid var(--line); border-radius:12px; padding:16px 14px;
    background:var(--surface); text-align:center;
    opacity:0; transform:translateY(6px);
    transition:opacity .28s ease, transform .28s ease;
    transition-delay:calc(var(--i)*70ms)}
  .node.in{opacity:1; transform:none}
  .node .loc{font-weight:600; font-size:14px}
  .node .tag{font-size:26px; font-weight:800; margin-top:10px; letter-spacing:.02em}
  .node.ok .tag{color:var(--ok)} .node.block .tag{color:var(--block)}
  .node.warn .tag{color:var(--warn)}
  .node .ip{font-family:var(--font-mono); font-size:12px; color:var(--muted);
    margin-top:10px; word-break:break-all; min-height:16px}

  @media(prefers-reduced-motion:reduce){
    .node{transition:none; transition-delay:0ms!important; opacity:1; transform:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>中国アクセスチェック</h1>
  </header>

  <div class="panel">
    <div class="querybar">
      <label class="field">
        <span class="glyph">https://</span>
        <input id="domain" type="text" placeholder="ドメインを入力（例: example.com）" autocomplete="off" spellcheck="false">
      </label>
      <button class="go" id="run">チェック</button>
    </div>
  </div>

  <section class="results" id="results" hidden>
    <div class="banner" id="error" hidden></div>
    <div class="meta">
      <span>ドメイン <b id="mDomain"></b></span>
      <span>本来のIP <b id="mExpected"></b></span>
    </div>
    <div class="nodes" id="nodes"></div>
  </section>
</div>

<script>
// 設定
const CONFIG = {
  // Cloudflare: '/proxy' / Vercel: '/api/proxy' / PHP: './proxy.php'
  endpoint: '/proxy',
};

// ノード地名（英語→日本語）
const LOC = {
  'Beijing':'北京', 'Shenzhen':'深セン', 'Inner Mongolia':'内モンゴル',
  'Heilongjiang Province':'黒竜江', 'Yunnan Province':'雲南',
};

const $ = s => document.querySelector(s);
const input = $('#domain'), runBtn = $('#run');

function cleanDomain(v){
  return (v||'').trim().replace(/^https?:\/\//i,'').replace(/\/.*$/,'').replace(/[^a-zA-Z0-9.\-]/g,'');
}

runBtn.onclick = () => runTest();
input.addEventListener('keydown', e => { if(e.key==='Enter') runTest(); });

async function runTest(){
  const domain = cleanDomain(input.value);
  if(!domain){ input.focus(); return; }
  input.value = domain;
  runBtn.disabled = true; runBtn.textContent = 'チェック中…';
  try{
    const r = await fetch(`${CONFIG.endpoint}?domain=${encodeURIComponent(domain)}`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    render(data);
  }catch(e){
    showError('エラー: ' + e.message);
  }finally{
    runBtn.disabled = false; runBtn.textContent = 'チェック';
  }
}

function showError(msg){
  $('#error').textContent = msg; $('#error').hidden = false;
  $('#nodes').innerHTML = '';
  $('#mDomain').textContent = '—'; $('#mExpected').textContent = '—';
  $('#results').hidden = false;
}

function render(data){
  $('#error').hidden = true;
  $('#mDomain').textContent = data.domain || '—';
  $('#mExpected').textContent = data.expected || '—';

  const box = $('#nodes'); box.innerHTML = '';
  (data.nodes||[]).forEach((n,i) => {
    const ok = n.status==='ok';
    const cls = ok ? 'ok' : (n.status==='error' ? 'block' : 'warn');
    const tag = ok ? '正常' : (n.status==='error' ? '失敗' : '異常');
    const el = document.createElement('div');
    el.className = 'node ' + cls;
    el.style.setProperty('--i', i);
    el.innerHTML =
      '<div class="loc">' + (LOC[n.location]||n.location) + '</div>' +
      '<div class="tag">' + tag + '</div>' +
      '<div class="ip">' + (n.ips || '—') + '</div>';
    box.appendChild(el);
    requestAnimationFrame(()=> requestAnimationFrame(()=> el.classList.add('in')));
  });

  $('#results').hidden = false;
  $('#results').scrollIntoView({behavior:'smooth', block:'nearest'});
}
</script>
</body>
</html>
